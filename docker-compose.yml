services:
  backend:
    image: mrx505/attendance-backend:latest
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=[REDACTED:secret-value]
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRATION_MINUTES=30
      - DATABASE_URL=sqlite+aiosqlite:///database.db
    restart: unless-stopped
